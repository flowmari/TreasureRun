name: TreasureRun
version: 0.1.10-alpha
main: plugin.TreasureRunMultiChestPlugin
api-version: 1.20
softdepend: [ProtocolLib]

commands:
  trsecret:
    description: Completes the Treasure Shop secret trade fallback.
    usage: /trsecret
  treasuresecret:
    description: Completes the Treasure Shop secret trade fallback.
    usage: /treasuresecret
  packetI18nProbe:
    description: Send Minecraft translatable component samples for PacketI18n audit.
    usage: /packetI18nProbe
    permission: treasure.admin
  treasureReload:
    description: Reload TreasureRun config.yml (including language settings)
    usage: /<command>
    permission: treasure.reload
    aliases: [gameReload]

  gameRank:
    description: Show the top 10 players.
    usage: /<command>
    permission: treasure.rank

  craftspecialemerald:
    description: Craft a special emerald using 3 diamonds.
    usage: /<command>
    permission: treasure.craftspecialemerald

  checktreasureemerald:
    description: Check if the item in main hand is Treasure Emerald (PDC).
    usage: /checktreasureemerald
    permission: treasure.checktreasureemerald

  gameMenu:
    description: Show the TreasureRun rule menu.
    usage: /gameMenu
    permission: treasure.menu

  gameEnd:
    description: End TreasureRun game
    usage: /gameEnd
    permission: treasure.admin

  gamestart:
    description: Start TreasureRun game (official)
    usage: /gamestart [easy|normal|hard]
    permission: treasure.admin

  clearStageBlocks:
    description: Clear nearby difficulty blocks placed by TreasureRun.
    usage: /clearStageBlocks
    permission: treasure.clearstage

  quoteFavorite:
    description: Save/List/Remove your favorite quotes
    usage: /quoteFavorite <latest|list|remove|reread|book>
    permission: treasure.quoteFavorite

    aliases: [qfav, quotefav, favquote]

  # ✅ 追加：言語切替コマンド
  lang:
    description: Set your language
    usage: /lang <code>
    permission: treasure.lang

  treasureExportLang:
    description: Export config.yml messages.translation.* to languages/*.yml
    usage: /treasureexportLang [overwrite]
    permission: treasure.reload

  # =============================
  # ★追加：撮影・動作確認用（デバッグ）コマンド
  # =============================
  rank:
    description: Debug - force rank effect (1/2/3)
    usage: /rank <1|2|3>
    permission: treasure.debug.rank

  heartbeatTest:
    description: Debug - play an audible heartbeat cue test.
    usage: /heartbeatTest
    permission: treasure.debug.heartbeat

permissions:
  treasure.admin:
    description: Administrative TreasureRun commands.
    default: op

  treasure.start:
    description: Legacy /gamestart permission node; round management uses treasure.admin.
    default: op

  treasure.reload:
    description: /treasureReload または /gameReload で config.yml を再読み込みできる権限
    default: op

  treasure.game:
    description: Legacy /gameEnd permission node; round management uses treasure.admin.
    default: op

  treasure.rank:
    description: /gameRank コマンドを使用できる権限
    default: true

  treasure.craftspecialemerald:
    description: /craftspecialemerald コマンドを使用できる権限
    default: true

  treasure.checktreasureemerald:
    description: /checktreasureemerald を使用できる権限
    default: true

  treasure.menu:
    description: /gameMenu で目次を表示できる権限
    default: true

  treasure.clearstage:
    description: /clearStageBlocks でステージの難易度ブロックを掃除できる権限
    default: op

  treasure.quoteFavorite:
    description: /quoteFavorite を使用できる権限（Favorites図鑑/再読）
    default: true

  # ✅ 追加：/lang 用権限
  treasure.lang:
    description: /lang を使用できる権限
    default: true

  # =============================
  # ★追加：/rank（デバッグ）用権限
  # =============================
  treasure.debug.rank:
    description: /rank <1|2|3> を使用できる権限（撮影・動作確認用）
    default: op

  treasure.debug.heartbeat:
    description: /heartbeatTest を使用できる権限（heartbeat cue 動作確認用）
    default: op

