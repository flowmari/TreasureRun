name: Alpha tester feedback
description: Share first-impression setup, gameplay, or documentation feedback for TreasureRun alpha testing
title: "[Alpha feedback]: "
body:
  - type: markdown
    attributes:
      value: |
        Thank you for testing TreasureRun.

        This form is for short first-impression feedback. You do not need to do a deep code review or a production-readiness review.

        Best starting point:

        `docs/playtest/PLAYER_QUICKSTART.md`

        Please report only what you actually tried and observed.

  - type: dropdown
    id: test-scope
    attributes:
      label: What did you test?
      description: Choose the closest option.
      options:
        - Fresh clone setup
        - Existing local checkout update
        - Player Quickstart
        - Prepared demo world
        - Basic gameplay commands
        - Treasure hunt gameplay flow
        - Wandering-trader custom trade
        - README or tester guide clarity
        - Other / partial test
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Test environment
      description: Share only what you know.
      placeholder: |
        OS:
        Minecraft Java Edition version:
        Java version, if known:
        Docker version, if known:
        Fresh clone or existing checkout:
    validations:
      required: false

  - type: dropdown
    id: server-join-result
    attributes:
      label: Could you start the test server and join localhost:25575?
      options:
        - Yes
        - Partially
        - No
        - Not tried
    validations:
      required: true

  - type: textarea
    id: commands-tried
    attributes:
      label: Commands or steps tried
      description: Paste the commands or steps you actually tried.
      placeholder: |
        Example:
        - ./scripts/contributor-up.sh MyMinecraftName
        - joined localhost:25575
        - /lang en
        - /gamestart normal
        - /gameRank weekly
        - tried the wandering-trader custom trade
    validations:
      required: false

  - type: textarea
    id: observations
    attributes:
      label: First-impression feedback
      description: You do not need to answer every possible question. Even 3-5 honest bullets are very helpful.
      placeholder: |
        - What worked?
        - What was clear?
        - What was confusing?
        - Did you understand what to do after /gamestart?
        - Did the README explain the gameplay before the i18n architecture?
        - Did the wandering-trader trade path make sense?
        - Did the custom trade video help?
    validations:
      required: true

  - type: textarea
    id: improvement
    attributes:
      label: What would make this easier for another first-time tester?
      description: Small suggestions are welcome.
    validations:
      required: false

  - type: textarea
    id: evidence
    attributes:
      label: Logs, screenshots, or terminal output
      description: Optional. Paste only what is relevant.
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        Boundaries:

        - TreasureRun is currently an alpha project.
        - The verified target is Spigot 1.20.1.
        - This is not a Paper compatibility claim.
        - This is not a production-readiness review.
        - Please report only what you actually tried and observed.
