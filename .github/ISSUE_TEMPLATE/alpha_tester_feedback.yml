name: Alpha tester feedback
description: Share first-impression setup feedback for TreasureRun alpha testing
title: "[Alpha feedback]: "
body:
  - type: markdown
    attributes:
      value: |
        Thank you for testing TreasureRun.

        This form is for short first-impression setup feedback. You do not need to do a deep code review or a production-readiness review.

        If you were personally asked to comment on the shared alpha testing thread, you can comment on that issue instead. Use this form if you prefer to open a separate feedback issue.

        Please report only what you actually tried and observed.

  - type: dropdown
    id: test-scope
    attributes:
      label: What did you test?
      description: Choose the closest option.
      options:
        - Fresh clone setup
        - Existing local checkout update
        - Prepared demo world
        - Gameplay commands
        - README or tester guide clarity
        - Other / partial test
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Test environment
      description: Share only what you know.
      placeholder: |
        OS:
        Minecraft Java Edition version:
        Java version, if known:
        Fresh clone or existing checkout:
    validations:
      required: false

  - type: dropdown
    id: server-join-result
    attributes:
      label: Could you start the test server and join localhost:25575?
      options:
        - Yes
        - Partially
        - No
        - Not tried
    validations:
      required: true

  - type: textarea
    id: observations
    attributes:
      label: First-impression feedback
      description: You do not need to answer every possible question. Even 3–5 honest bullets are very helpful.
      placeholder: |
        - What worked?
        - What was clear?
        - What was confusing?
        - Did the prepared demo world appear?
        - Did the README or demo-world guide help?
    validations:
      required: true

  - type: textarea
    id: setup-notes
    attributes:
      label: Setup notes
      description: Mention any step that succeeded, failed, or felt unclear.
      placeholder: |
        Example:
        - The ZIP extracted correctly.
        - .local/demo-world/world/level.dat existed.
        - ./scripts/contributor-up.sh started the runtime.
        - I could / could not join localhost:25575.
    validations:
      required: false

  - type: textarea
    id: improvement
    attributes:
      label: What would make this easier for another first-time tester?
      description: Small suggestions are welcome.
    validations:
      required: false

  - type: textarea
    id: evidence
    attributes:
      label: Logs, screenshots, or terminal output
      description: Optional. Paste only what is relevant.
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        Boundaries:

        - TreasureRun is currently an alpha project.
        - The verified target is Spigot 1.20.1.
        - This is not a Paper compatibility claim.
        - This is not a production-readiness review.
        - Please report only what you actually tried and observed.
