name: Bug report
description: Report a reproducible TreasureRun bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Please list the exact steps.
      placeholder: |
        1. Start the server
        2. Join as a player
        3. Run /lang ojp
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Logs, screenshots, or terminal output
      description: Paste relevant logs or attach screenshots.
    validations:
      required: false
