name: ranking-api-ci

on:
  pull_request:
    paths:
      - 'ranking-api/**'
      - 'src/main/resources/db/migration/**'
      - '.github/workflows/ranking-api-ci.yml'
  push:
    paths:
      - 'ranking-api/**'
      - 'src/main/resources/db/migration/**'
      - '.github/workflows/ranking-api-ci.yml'

jobs:
  ranking-api-mysql-http-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Allow Gradle wrapper execution
        run: chmod +x ./gradlew

      - name: Build and test existing Spigot plugin
        run: ./gradlew clean test build --no-daemon

      - name: Build and test Ranking Read API against disposable MySQL 8
        run: ./gradlew -p ranking-api clean test build --no-daemon
