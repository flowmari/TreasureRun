name: treasurerun-contributor

services:
  minecraft_mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: treasureDB
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -prootpassword --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    volumes:
      - contributor_mysql_data:/var/lib/mysql
    networks:
      - contributor_network

  minecraft_spigot:
    image: itzg/minecraft-server:java17
    environment:
      EULA: "TRUE"
      TYPE: SPIGOT
      VERSION: "1.20.1"
      MEMORY: "${TREASURERUN_MEMORY:-2G}"
      OPS: "${TREASURERUN_OPS:-}"
    ports:
      - "${TREASURERUN_MC_PORT:-25575}:25565"
    volumes:
      - contributor_spigot_data:/data
    depends_on:
      minecraft_mysql:
        condition: service_healthy
    networks:
      - contributor_network

volumes:
  contributor_mysql_data:
  contributor_spigot_data:

networks:
  contributor_network:
    driver: bridge
