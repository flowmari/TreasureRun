spring.application.name=treasurerun-ranking-api

spring.datasource.url=${TREASURERUN_DB_URL:jdbc:mysql://localhost:3306/treasurerun?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${TREASURERUN_DB_USER:treasurerun}
spring.datasource.password=${TREASURERUN_DB_PASSWORD:treasurerun}

# This service exposes leaderboard reads only.
spring.datasource.hikari.read-only=true

server.port=${PORT:8080}
